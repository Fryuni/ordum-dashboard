#:schema node_modules/wrangler/config-schema.json
name = "ordum-dashboard"
main = "src/worker.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["als"]
workers_dev = false
preview_urls = true

[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*", "/jita/*"]

[observability]
enabled = true
[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

[[kv_namespaces]]
binding = "jita_api_cache"
id = "4841edcb05cd4978bec7f705a82d12de"
