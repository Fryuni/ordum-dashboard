#:schema node_modules/wrangler/config-schema.json
name = "ordum-dashboard"
main = "src/worker.ts"
compatibility_date = "2026-02-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = true

[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*", "/jita/*"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = true

[[kv_namespaces]]
binding = "jita_api_cache"
id = "4841edcb05cd4978bec7f705a82d12de"

[[d1_databases]]
binding = "ordum_storage_audit"
database_name = "ordum-storage-audit"
database_id = "b0aed2a4-0c01-4ea4-ac26-c87d6aa4cfa8"

# ─── PR preview environment ─────────────────────────────────────────────────────
# `wrangler deploy --env preview` creates a separate worker so that
# observability (logs, traces) works — `versions upload` skips those settings.
# The worker name is overridden per-PR via --name in CI.
[env.preview]
workers_dev = true

[[env.preview.kv_namespaces]]
binding = "jita_api_cache"
id = "4841edcb05cd4978bec7f705a82d12de"

[[env.preview.d1_databases]]
binding = "ordum_storage_audit"
database_name = "ordum-storage-audit"
database_id = "b0aed2a4-0c01-4ea4-ac26-c87d6aa4cfa8"
