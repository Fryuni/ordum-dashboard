#:schema node_modules/wrangler/config-schema.json
name = "ordum-dashboard"
main = "src/worker.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

routes = [
  { pattern = "ordum.fun", custom_domain = true, override_existing_dns_record = true },
]

[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = ["/api/*", "/jita/*"]

[observability]
enabled = true
