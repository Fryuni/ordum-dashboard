name: CI

on:
  pull_request:

jobs:
  lockfile:
    name: Check for foreign lockfiles
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Ensure no non-bun lockfiles are committed
        run: |
          bad_files=""
          for f in package-lock.json yarn.lock pnpm-lock.yaml; do
            if [ -f "$f" ]; then
              bad_files="$bad_files $f"
            fi
          done
          if [ -n "$bad_files" ]; then
            echo "::error::Foreign lockfile(s) found:$bad_files — this project uses bun"
            exit 1
          fi

  copyright:
    name: Check copyright headers
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check license headers
        run: bun scripts/add-license-headers.ts --check

  format:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting
        run: bun run format --check

  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download game data
        run: bash scripts/update-gamedata.sh

      - name: Type check
        run: bun run validate
